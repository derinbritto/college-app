<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ACT — College Portal</title>
<meta name="theme-color" content="#16a34a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ACT Portal"/>
<link rel="manifest" href="manifest.json"/>



<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#bbf7d0,#86efac,#4ade80);display:flex;justify-content:center;align-items:flex-start;padding:20px;}
/* Desktop — phone mockup */
@media (min-width:601px){
  body{min-height:100vh;background:linear-gradient(135deg,#bbf7d0,#86efac,#4ade80);display:flex;justify-content:center;align-items:flex-start;padding:20px;}
  #phone{width:390px;min-height:780px;border-radius:44px;box-shadow:0 40px 100px rgba(0,0,0,0.3),0 0 0 8px #15803d;}
}
/* Mobile — true fullscreen */
@media (max-width:600px){
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    overflow:hidden;
    background:#fff;
  }
  body{display:block;}
  #phone{
    position:fixed !important;
    top:0 !important;
    left:0 !important;
    right:0 !important;
    bottom:0 !important;
    width:100% !important;
    height:100% !important;
    min-height:100% !important;
    border-radius:0 !important;
    box-shadow:none !important;
    margin:0 !important;
    display:flex;
    flex-direction:column;
  }
  .screen{
    display:flex;
    flex-direction:column;
    flex:1;
    height:100%;
    min-height:unset !important;
    overflow:hidden;
  }
  .bottom-nav{
    flex-shrink:0;
    width:100%;
    background:#fff;
    border-top:1px solid #e5e7eb;
    padding:6px 0 0 0;
    padding-bottom:calc(env(safe-area-inset-bottom) + 16px);
    margin-bottom:0;
  }
  .scroll{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }
  .overlay,.toast,.saving{position:fixed !important;}
  .login-card{overflow-y:auto;}
}
#phone{width:390px;min-height:780px;background:#fff;border-radius:44px;box-shadow:0 40px 100px rgba(0,0,0,0.3),0 0 0 8px #15803d;overflow:hidden;display:flex;flex-direction:column;position:relative;margin:auto;}
input,select,button{font-family:inherit;font-size:inherit;}
input:focus,select:focus{outline:none;}
button{cursor:pointer;}
.screen{display:flex;flex-direction:column;height:100%;min-height:780px;}
.login-top{background:linear-gradient(160deg,#15803d,#16a34a 60%,#22c55e);padding:36px 24px 28px;position:relative;overflow:hidden;text-align:center;flex-shrink:0;}
.c1{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.08);}
.c2{position:absolute;bottom:-20px;left:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.06);}
.login-card{flex:1;overflow-y:auto;padding:20px;}
.role-toggle{display:flex;background:#f3f4f6;border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
.role-btn{flex:1;background:transparent;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;color:#6b7280;}
.role-btn.active{background:#fff;color:#16a34a;box-shadow:0 1px 4px rgba(0,0,0,0.12);}
.field{margin-bottom:12px;}
.field-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
.field-inner{display:flex;align-items:center;border:1.5px solid #e5e7eb;border-radius:12px;overflow:hidden;background:#fafafa;}
.field-icon{padding:0 10px;font-size:16px;}
.field-inner input{flex:1;border:none;background:transparent;padding:12px 0;font-size:14px;color:#111;}
.eye-btn{background:none;border:none;padding:0 12px;font-size:16px;}
.forgot-link{background:none;border:none;color:#16a34a;font-size:12px;font-weight:600;padding:2px 0 10px;display:block;text-align:left;}
.err-box{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:10px;padding:8px 12px;font-size:12px;margin-bottom:10px;}
.login-btn{width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;margin-bottom:16px;}
.hdr{background:linear-gradient(135deg,#15803d,#16a34a);padding:18px 16px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.hdr-title{color:#fff;font-weight:800;font-size:16px;}
.hdr-sub{color:rgba(255,255,255,0.7);font-size:10px;margin-top:1px;}
.logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:600;}
.profile-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);margin:10px 10px 0;border-radius:18px;padding:14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(22,163,74,0.12);}
.profile-photo{font-size:38px;background:#fff;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.grade-badge{color:#fff;font-weight:900;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.tab-row{display:flex;border-bottom:1px solid #e5e7eb;padding:0 4px;flex-shrink:0;margin-top:8px;overflow-x:auto;}
.tab-btn{flex:0 0 auto;background:none;border:none;padding:9px 7px;font-size:10px;font-weight:600;white-space:nowrap;color:#9ca3af;border-bottom:2px solid transparent;}
.tab-btn.active{color:#16a34a;border-bottom:2.5px solid #16a34a;}
.scroll{flex:1;overflow-y:auto;padding:8px 12px;}
.bottom-nav{display:flex;background:#fff;border-top:1px solid #e5e7eb;padding-bottom:8px;flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;padding:8px 4px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#9ca3af;font-size:10px;font-weight:600;}
.nav-btn.active{color:#16a34a;}
.nav-icon{font-size:18px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:#f9fafb;border-radius:14px;padding:12px;border:1px solid #e5e7eb;}
.stat-val{font-size:20px;font-weight:900;}
.stat-label{font-size:10px;color:#6b7280;margin-top:2px;}
.alert{border-radius:10px;padding:8px 12px;font-size:12px;margin-bottom:6px;}
.alert-red{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
.alert-yellow{background:#fef3c7;border:1px solid #fde68a;color:#92400e;}
.alert-green{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.alert-blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.sec{font-size:12px;font-weight:700;color:#374151;margin-bottom:8px;margin-top:6px;}
.empty{color:#9ca3af;text-align:center;font-size:13px;padding:24px;}
.mark-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;border-radius:10px;padding:4px 6px;}
.mark-sub{width:84px;font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mark-bar-wrap{flex:1;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
.mark-bar-fill{height:100%;border-radius:4px;}
.fee-cat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.staff-card{background:#f9fafb;border-radius:14px;padding:12px;margin-bottom:10px;border:1px solid #e5e7eb;}
.sub-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#f9fafb;border-radius:10px;padding:6px 8px;}
.sub-row-label{flex:1;font-size:11px;font-weight:600;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sub-row-input{width:56px;border:1.5px solid #d1d5db;border-radius:8px;padding:5px 6px;font-size:12px;text-align:center;background:#fff;}
.grade-select{border:none;border-radius:8px;padding:5px 6px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;min-width:46px;}
.send-row{display:flex;gap:8px;margin-top:8px;}
.send-btn{flex:1;border:none;border-radius:10px;color:#fff;padding:9px;font-size:11px;font-weight:700;}
.fg{margin-bottom:12px;}
.fl{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
.fi{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 12px;font-size:13px;background:#fff;}
.ferr{font-size:11px;color:#dc2626;margin-top:3px;font-weight:500;}
.action-btn{width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;margin-top:4px;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;z-index:50;}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:22px;width:100%;}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:#15803d;color:#fff;padding:10px 18px;border-radius:20px;font-weight:600;font-size:12px;z-index:99;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.notif-card{display:flex;gap:10px;align-items:flex-start;border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.att-ring{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto 12px;}
.detail-card{background:#f9fafb;border-radius:14px;padding:12px;border:1px solid #e5e7eb;}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px;}
.gender-row{display:flex;gap:8px;}
.gender-btn{flex:1;border-radius:10px;padding:8px;font-weight:700;font-size:12px;}
/* Loading spinner */
.spinner{width:36px;height:36px;border:4px solid #e5e7eb;border-top:4px solid #16a34a;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
/* DB status dot */
.db-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.db-online{background:#22c55e;}
.db-offline{background:#ef4444;}
.db-connecting{background:#f59e0b;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
/* Save indicator */
.saving{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:4px 12px;border-radius:20px;font-size:10px;z-index:80;}
</style>
<!-- Firebase App + Messaging -->
</head>
<body>
<div id="phone"></div>

<script>
// ── Constants ─────────────────────────────────────────────────
const HARDCODED_STAFF = [
  {id:"staff1",role:"staff",email:"staff1@2026",password:"2026",name:"staff1",photo:"👨‍🏫",department:"IT"},
  {id:"staff2",role:"staff",email:"staff2@2026",password:"2026",name:"staff2",photo:"👨‍🏫",department:"IT"},
];
const DEFAULT_SUBJECTS = ["Data Structures","Networks","DBMS","Web Tech","English","Operating Systems","Software Engg"];
const GRADE_OPTIONS = ["O","A+","A","B+","B","C","F"];
const GRADE_COLORS = {O:"#16a34a","A+":"#0d9488",A:"#2563eb","B+":"#7c3aed",B:"#9333ea",C:"#ca8a04",F:"#dc2626"};
const PASS_MARK = 50;
const CI = {name:"Arjun College of Technology",short:"ACT",tagline:"Shaping Future Innovators — Information Technology"};

// ── App State ──────────────────────────────────────────────────
let APP = {
  screen:"login",  // login | forgot | student | staff
  authUser: null,
  dbStatus: "connecting", // connecting | online | offline
  saving: false,

  // Live data from Firebase
  students: {},     // {id: studentObj}
  staffList: {},    // {id: staffObj}
  marks: {},        // {studentId: {subject: score}}
  grades: {},       // {studentId: {subject: grade}}
  attendance: {},   // {studentId: pct}
  subjects: [...DEFAULT_SUBJECTS],
  notifications: [],// array

  // UI state
  staffView:"upload", staffSearch:"",
  subjectEditing:false, subjectDraft:[...DEFAULT_SUBJECTS],
  editingStaffId:null,
  addForm:emptyStudentForm(), addErrors:{},
  staffForm:emptyStaffForm(), staffFormErrors:{},
  modal:null, toast:"", toastTimer:null,
  fbConfig: loadSavedConfig(),
};

function emptyStudentForm(){return{name:"",roll:"",email:"",password:"",semester:"Semester 1",gender:"male",attendance:"85",parentPhone:"",tuitionTotal:"45000",hostelTotal:"30000",placementTotal:"5000",transportTotal:"12000",tuitionPaid:"",hostelPaid:"",placementPaid:"",transportPaid:""};}
function emptyStaffForm(){return{name:"",email:"",password:"",department:"IT",gender:"male"};}
function loadSavedConfig(){try{return JSON.parse(localStorage.getItem("act_fb_config")||"null");}catch{return null;}}

// ── Firebase REST API (no SDK needed!) ────────────────────────
let FB_URL = "https://act-portal-ad480-default-rtdb.firebaseio.com";


// ── Helpers ────────────────────────────────────────────────────
const scoreToGrade = s => s<50?"F":s>=91?"O":s>=81?"A+":s>=71?"A":s>=61?"B+":"B";
const isPass = s => s >= PASS_MARK;
const getAttColor = p => p>=85?"#16a34a":p>=75?"#ca8a04":"#dc2626";

function getGrade(marks) {
  const vals=Object.values(marks);
  if(!vals.length) return{grade:"—",label:"N/A",color:"#6b7280"};
  if(vals.some(v=>v<PASS_MARK)) return{grade:"F",label:"Failed",color:"#dc2626"};
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  if(avg>=90) return{grade:"O",label:"Outstanding",color:"#16a34a"};
  if(avg>=75) return{grade:"A",label:"Excellent",color:"#2563eb"};
  if(avg>=60) return{grade:"B",label:"Good",color:"#7c3aed"};
  return{grade:"C",label:"Average",color:"#ca8a04"};
}

function resolveMarks(studentId) {
  const mo = APP.marks[studentId]||{};
  const r={};
  APP.subjects.forEach(sub=>{ r[sub] = (mo[sub]!==undefined) ? mo[sub] : 0; });
  return r;
}

function allStudents() { return Object.values(APP.students); }
function allStaff() {
  const dynStaff = Object.values(APP.staffList);
  // Merge hardcoded with overrides from DB
  return HARDCODED_STAFF.map(h => {
    const ov = dynStaff.find(d=>d.id===h.id);
    return ov ? {...h,...ov} : h;
  }).concat(dynStaff.filter(d=>!HARDCODED_STAFF.find(h=>h.id===d.id)));
}
function allUsers() { return [...HARDCODED_STAFF, ...allStudents(), ...Object.values(APP.staffList)]; }

function showToast(msg) {
  if(APP.toastTimer) clearTimeout(APP.toastTimer);
  APP.toast=msg;
  APP.toastTimer=setTimeout(()=>{APP.toast="";render();},3000);
}

// ── DOM Helpers ────────────────────────────────────────────────
function el(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function div(cls){return el("div",cls);}
function span(cls,txt){return el("span",cls,txt);}
function btn(cls,txt,onclick){const b=el("button",cls,txt);b.onclick=onclick;return b;}
function css(e,s){Object.assign(e.style,s);return e;}
function inp(ph,val,cb,type="text"){const i=document.createElement("input");i.type=type;i.placeholder=ph;i.value=val||"";i.className="fi";i.oninput=cb;return i;}
function fieldRow(label,req,input,err){
  const fg=div("fg"),fl=div("fl");fl.textContent=label;
  if(req){const s=span("","*");s.style.color="#dc2626";fl.appendChild(s);}
  fg.appendChild(fl);fg.appendChild(input);
  if(err){const e=div("ferr");e.textContent=err;fg.appendChild(e);}
  return fg;
}
function loginField(label,icon,inputEl){
  const w=div("field"),l=div("field-label");l.textContent=label;
  const inner=div("field-inner");inner.appendChild(span("field-icon",icon));inner.appendChild(inputEl);
  w.appendChild(l);w.appendChild(inner);return w;
}
function secTitle(txt){const d=div("sec");d.textContent=txt;return d;}
function emptyMsg(txt){const d=div("empty");d.textContent=txt;return d;}
function alertEl(type,txt){const d=div("alert alert-"+type);d.textContent=txt;return d;}
function progressBar(pct,color,h=8){
  const w=div("");css(w,{height:h+"px",background:"#e5e7eb",borderRadius:"4px",overflow:"hidden",marginTop:"5px"});
  const f=div("");css(f,{height:"100%",width:pct+"%",background:color,borderRadius:"4px"});
  w.appendChild(f);return w;
}
function statCard(val,label,color,pct){
  const c=div("stat-card"),v=div("stat-val"),l=div("stat-label");
  v.textContent=val;v.style.color=color;l.textContent=label;
  c.appendChild(v);c.appendChild(l);
  if(pct!==undefined)c.appendChild(progressBar(pct,color,4));
  return c;
}
function headerEl(title,sub,onLogout){
  const h=div("hdr"),left=div(""),t=div("hdr-title"),s=div("hdr-sub"),lb=btn("logout-btn","⎋ Logout",onLogout);
  t.textContent=title;s.textContent=sub;left.appendChild(t);left.appendChild(s);h.appendChild(left);
  // DB status
  const dot=div("");dot.style.cssText=`display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:${APP.dbStatus==="online"?"#22c55e":APP.dbStatus==="offline"?"#ef4444":"#f59e0b"};`;
  const st=div("");st.style.cssText="display:flex;align-items:center;gap:6px;";
  st.appendChild(dot);st.appendChild(lb);h.appendChild(st);
  return h;
}
function profileCardEl(user,badge,badgeColor,badgeFontSize){
  const c=div("profile-card"),ph=div("profile-photo"),info=div(""),nm=div(""),sub=div(""),em=div(""),gb=div("grade-badge");
  ph.textContent=user.photo;nm.style.cssText="font-weight:800;font-size:15px;";nm.textContent=user.name;
  sub.style.cssText="font-size:10px;color:#6b7280;";sub.textContent=user.roll||user.department;
  em.style.cssText="font-size:10px;color:#16a34a;font-weight:500;";em.textContent=user.email;
  css(info,{flex:"1",minWidth:"0"});info.appendChild(nm);info.appendChild(sub);info.appendChild(em);
  gb.textContent=badge;gb.style.background=badgeColor;if(badgeFontSize)gb.style.fontSize=badgeFontSize+"px";
  c.appendChild(ph);c.appendChild(info);c.appendChild(gb);return c;
}
function tabsEl(tabs,labels,active,onChange){
  const row=div("tab-row");
  tabs.forEach((t,i)=>{const b=btn("tab-btn"+(t===active?" active":""),labels[i],()=>onChange(t));row.appendChild(b);});
  return row;
}
function bottomNavEl(items,active,onChange){
  const nav=div("bottom-nav");
  items.forEach(item=>{
    const b=btn("nav-btn"+(item.v===active?" active":""),"",()=>onChange(item.v));
    const ic=div("nav-icon");ic.textContent=item.icon;const lb=div("");lb.textContent=item.label;
    b.appendChild(ic);b.appendChild(lb);nav.appendChild(b);
  });
  return nav;
}
function genderToggle(value,onChange,ml,fl2){
  const row=div("gender-row");
  ["male","female"].forEach(g=>{
    const active=value===g;
    const b=btn("gender-btn",g==="male"?(ml||"👨‍🏫 Male"):(fl2||"👩‍🏫 Female"),()=>onChange(g));
    b.style.border=`2px solid ${active?"#16a34a":"#e5e7eb"}`;
    b.style.background=active?"#f0fdf4":"#fff";b.style.color=active?"#16a34a":"#6b7280";
    row.appendChild(b);
  });
  return row;
}

// ── RENDER ─────────────────────────────────────────────────────
function render(){
  const phone=document.getElementById("phone");
  phone.innerHTML="";
  const screen=document.createElement("div");screen.className="screen";
  if(APP.screen==="setup") buildSetupScreen(screen);
  else if(APP.screen==="login") buildLogin(screen);
  else if(APP.screen==="forgot") buildForgot(screen);
  else if(APP.screen==="student") buildStudentApp(screen);
  else if(APP.screen==="staff") buildStaffApp(screen);
  if(APP.toast){const t=el("div","toast",APP.toast);phone.appendChild(t);}
  if(APP.saving){const s=el("div","saving","☁️ Saving…");phone.appendChild(s);}
  if(APP.modal) buildModal(phone);
  phone.appendChild(screen);
}

// ── SETUP SCREEN ───────────────────────────────────────────────
let setupState = {
  databaseURL: APP.fbConfig?.databaseURL||"",
  error:"", testing:false, step: APP.fbConfig ? "ready" : "form"
};

function buildSetupScreen(screen) {
  const S=setupState;

  // If saved config exists, auto-connect
  if(S.step==="ready" && APP.fbConfig) {
    const top=div("login-top");
    top.innerHTML=`<div class="c1"></div><div class="c2"></div><div style="font-size:48px;position:relative;z-index:1">🏛️</div><div style="color:#fff;font-weight:900;font-size:22px;position:relative;z-index:1;margin-top:4px">${CI.short}</div>`;
    screen.appendChild(top);
    const card=div("login-card");
    const spin=div("spinner");card.appendChild(spin);
    const msg=div("");msg.style.cssText="text-align:center;color:#6b7280;font-size:13px;margin-top:12px;";
    msg.textContent="Connecting to database…";card.appendChild(msg);
    screen.appendChild(card);
    // Auto-connect
    setTimeout(()=>{
      const ok=initFirebase(APP.fbConfig);
      if(ok){APP.screen="login";render();}
      else{S.step="form";S.error="Saved config failed. Please re-enter.";render();}
    },600);
    return;
  }

  const top=div("login-top");
  top.innerHTML=`<div class="c1"></div><div class="c2"></div><div style="font-size:40px;position:relative;z-index:1">🔥</div><div style="color:#fff;font-weight:900;font-size:20px;position:relative;z-index:1;margin-top:6px">Connect Firebase</div><div style="color:rgba(255,255,255,0.8);font-size:11px;position:relative;z-index:1;margin-top:3px">One-time setup to sync data across devices</div>`;
  screen.appendChild(top);

  const card=div("login-card");
  const info=alertEl("blue","📋 Only your Firebase Database URL is needed — much simpler!");
  info.style.marginBottom="14px";card.appendChild(info);

  if(S.error){const e=div("err-box");e.textContent="⚠️ "+S.error;card.appendChild(e);}

  // Only need Database URL for REST API!
  const urlInp=inp("https://act-portal-default-rtdb.firebaseio.com",S.databaseURL||"",e=>{setupState.databaseURL=e.target.value;S.error="";});
  const urlFg=fieldRow("🔥 Firebase Database URL",true,urlInp);
  const urlHelp=div("");urlHelp.style.cssText="font-size:11px;color:#6b7280;margin-top:-8px;margin-bottom:12px;line-height:1.6;";
  urlHelp.innerHTML="Find this in Firebase Console →<br>Realtime Database → Copy the URL at top<br><strong style=\"color:#374151\">Looks like: https://YOUR-PROJECT-default-rtdb.firebaseio.com</strong>";
  card.appendChild(urlFg);card.appendChild(urlHelp);

  const connectBtn=btn("login-btn",S.testing?"Testing connection…":"🔥 Connect & Start",()=>{
    const url=S.databaseURL.trim();
    if(!url||!url.startsWith("https")){S.error="Please enter your Firebase Database URL (starts with https://)";render();return;}
    S.testing=true;render();
    const cfg={databaseURL:url};
    // Test by fetching root
    fetch(url+"/.json?shallow=true").then(r=>{
      if(r.ok||r.status===401||r.status===403){
        // URL is valid (401/403 means rules issue not URL issue)
        localStorage.setItem("act_fb_config",JSON.stringify(cfg));
        APP.fbConfig=cfg;
        const ok=initFirebase(cfg);
        if(ok){APP.screen="login";showToast("🔥 Firebase connected!");render();}
        else{S.error="Could not connect. Please check URL.";S.testing=false;render();}
      } else {
        S.error="Invalid Database URL. Please check and try again.";S.testing=false;render();
      }
    }).catch(()=>{
      // Try anyway - might be CORS but URL could be valid
      localStorage.setItem("act_fb_config",JSON.stringify(cfg));
      APP.fbConfig=cfg;
      const ok=initFirebase(cfg);
      if(ok){APP.screen="login";showToast("🔥 Connected!");render();}
      else{S.error="Could not connect. Check your Database URL.";S.testing=false;render();}
    });
  });
  if(S.testing)connectBtn.style.opacity="0.7";
  card.appendChild(connectBtn);

  const helpBtn=btn("forgot-link","📖 How to get Firebase config →",()=>{
    window.open("https://console.firebase.google.com","_blank");
  });
  card.appendChild(helpBtn);

  screen.appendChild(card);
}

async function doLogin(){
  const S=loginState;S.error="";
  if(!S.email||!S.password){S.error="Please enter email and password.";render();return;}
  S.loading=true;render();

  const email=S.email.toLowerCase().trim();
  const pass=S.password;
  const role=S.role;

  // 1. Always check hardcoded staff first (no Firebase needed)
  let u=HARDCODED_STAFF.find(u=>u.email===email&&u.password===pass&&u.role===role);

  // 2. Fetch FRESH data from Firebase directly — don't rely on cached APP.students
  if(!u){
    try{
      // Fetch all students fresh from Firebase
      const res=await fetch(FB_URL+"/students.json");
      if(res.ok){
        const data=await res.json();
        if(data){
          APP.students=data;
          const all=Object.values(data);
          u=all.find(s=>s.email===email&&s.password===pass&&s.role===role);
        }
      }
    }catch(e){console.log("Firebase fetch error:",e);}
  }

  // 3. Check DB staff (also fetch fresh)
  if(!u){
    try{
      const res=await fetch(FB_URL+"/staff.json");
      if(res.ok){
        const data=await res.json();
        if(data){
          APP.staffList=data;
          const all=Object.values(data);
          u=all.find(s=>s.email===email&&s.password===pass&&s.role===role);
        }
      }
    }catch(e){console.log("Firebase staff fetch error:",e);}
  }

  if(u){
    APP.authUser=u;
    APP.screen=u.role==="student"?"student":"staff";
    loginState={email:"",password:"",showPass:false,error:"",loading:false,role:"student"};
  } else {
    S.error="Invalid credentials. Please try again.";
    S.loading=false;
  }
  render();
}

let forgotState={email:"",sent:false,error:"",loading:false};
function buildForgot(screen){
  const S=forgotState;
  const top=div("login-top");css(top,{minHeight:"160px"});
  top.innerHTML=`<div class="c1"></div><div class="c2"></div><div style="font-size:48px;position:relative;z-index:1">🔐</div><div style="color:#fff;font-weight:900;font-size:22px;position:relative;z-index:1;margin-top:6px">Reset Password</div>`;
  screen.appendChild(top);
  const card=div("login-card");
  if(!S.sent){
    card.innerHTML=`<div style="font-weight:800;font-size:18px;margin-bottom:4px">Forgot Password?</div><div style="color:#6b7280;font-size:13px;margin-bottom:14px">Enter your registered email to receive a reset link.</div>`;
    const ei=document.createElement("input");ei.type="email";ei.placeholder="Email Address";ei.value=S.email;
    css(ei,{flex:"1",border:"none",background:"transparent",padding:"12px 0",fontSize:"14px",color:"#111",outline:"none"});
    ei.oninput=e=>{S.email=e.target.value;S.error="";};
    card.appendChild(loginField("Registered Email","✉️",ei));
    if(S.error){const e=div("err-box");e.textContent="⚠️ "+S.error;card.appendChild(e);}
    const sb=btn("login-btn",S.loading?"Sending…":"Send Reset Link",()=>{
      if(!S.email){S.error="Enter your registered email.";render();return;}
      S.loading=true;render();
      setTimeout(()=>{
        const exists=allUsers().find(u=>u.email===S.email.toLowerCase().trim());
        if(exists){S.sent=true;showToast("📧 Password reset sent to "+S.email);}else{S.error="No account found with this email.";}
        S.loading=false;render();
      },800);
    });
    if(S.loading)sb.style.opacity="0.7";
    card.appendChild(sb);
  } else {
    const ok=div("");ok.style.cssText="text-align:center;padding:20px 0;";
    ok.innerHTML=`<div style="font-size:52px">📬</div><div style="font-weight:800;font-size:18px;margin-top:10px">Check your inbox!</div><div style="color:#6b7280;font-size:13px;margin-top:6px">A reset link was sent to <strong>${S.email}</strong></div>`;
    card.appendChild(ok);
  }
  card.appendChild(btn("forgot-link","← Back to Login",()=>{forgotState={email:"",sent:false,error:"",loading:false};APP.screen="login";render();}));
  screen.appendChild(card);
}

// ── STUDENT APP ────────────────────────────────────────────────
let studentView="dashboard";
function buildStudentApp(screen){
  const user=APP.authUser;
  const subs=APP.subjects;
  const marks=resolveMarks(user.id);
  const grades=APP.grades[user.id]||{};
  const att=APP.attendance[user.id]!==undefined?APP.attendance[user.id]:(user.attendance||85);
  const gi=getGrade(marks);
  const avg=subs.length?Math.round(Object.values(marks).reduce((a,b)=>a+b,0)/subs.length):0;
  const fees=user.fees||{tuition:45000,hostel:30000,placement:5000,transport:12000};
  const fp=user.feesPaid||{tuition:0,hostel:0,placement:0,transport:0};
  const totalFees=fees.tuition+fees.hostel+fees.placement+fees.transport;
  const totalPaid=fp.tuition+fp.hostel+fp.placement+fp.transport;
  const pending=totalFees-totalPaid;

  screen.appendChild(headerEl(CI.short,CI.name,()=>{APP.authUser=null;APP.screen="login";render();}));
  screen.appendChild(profileCardEl(user,gi.grade,gi.color));
  screen.appendChild(tabsEl(["dashboard","marks","attendance","fees"],["Home","Marks","Attend.","Fees"],studentView,v=>{studentView=v;render();}));

  const scroll=div("scroll");

  if(studentView==="dashboard"){
    scroll.appendChild(secTitle("📊 Quick Overview"));
    const grid=div("stat-grid");
    grid.appendChild(statCard(att+"%","Attendance",getAttColor(att),att));
    grid.appendChild(statCard(pending>0?"₹"+pending.toLocaleString():"✓ Paid","Fees Pending",pending>0?"#dc2626":"#16a34a"));
    grid.appendChild(statCard(avg+"%","Avg Marks",gi.color,avg));
    grid.appendChild(statCard(gi.grade,gi.label,gi.color));
    scroll.appendChild(grid);
    scroll.appendChild(secTitle("⚠️ Alerts"));
    if(att<75)scroll.appendChild(alertEl("red","📉 Low attendance! Minimum 75% required."));
    if(pending>0)scroll.appendChild(alertEl("yellow","💳 Fee of ₹"+pending.toLocaleString()+" is pending."));
    if(gi.grade==="F")scroll.appendChild(alertEl("red","❌ Failed in one or more subjects."));
    if(att>=75&&pending===0&&gi.grade!=="F")scroll.appendChild(alertEl("green","✅ All clear! You're in good academic standing."));
    scroll.appendChild(secTitle("🔔 Notifications from Staff"));
    const myNotifs=APP.notifications.filter(n=>n.studentId===user.id);
    if(!myNotifs.length)scroll.appendChild(emptyMsg("No notifications yet."));
    else myNotifs.forEach(n=>{
      const isBroad=n.isBroadcast;
      const nc=div("notif-card");
      nc.style.background=isBroad?"#f0fdf4":"#eff6ff";
      nc.style.border=isBroad?"1px solid #bbf7d0":"1px solid #bfdbfe";
      nc.style.borderRadius="12px";
      const ic=span("");ic.style.fontSize="22px";
      ic.textContent=isBroad?(n.msgType==="exam"?"📝":n.msgType==="holiday"?"🎉":n.msgType==="fees"?"💳":n.msgType==="event"?"🎊":"📢"):"📊";
      const info=div("");info.style.flex="1";
      if(isBroad){
        info.innerHTML=`<div style="font-weight:700;font-size:13px">${n.subject||"Announcement"}</div><div style="font-size:10px;color:#6b7280;margin-bottom:4px">From ${n.from||"Staff"} • ${new Date(n.time).toLocaleString()}</div><div style="font-size:12px;color:#374151;line-height:1.5">${n.message||""}</div>`;
      } else {
        info.innerHTML=`<div style="font-weight:600;font-size:12px">📊 Marks updated by staff</div><div style="font-size:10px;color:#6b7280">${new Date(n.time).toLocaleString()}</div>`;
      }
      nc.appendChild(ic);nc.appendChild(info);scroll.appendChild(nc);
    });
  }

  if(studentView==="marks"){
    scroll.appendChild(secTitle("📝 Semester Marks"));
    const hrow=div("");css(hrow,{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"});
    hrow.innerHTML=`<div style="width:84px;font-size:10px;font-weight:700;color:#9ca3af">SUBJECT</div><div style="flex:1;font-size:10px;font-weight:700;color:#9ca3af">SCORE</div><div style="width:46px;font-size:10px;font-weight:700;color:#9ca3af;text-align:right">MARKS</div><div style="width:36px;font-size:10px;font-weight:700;color:#9ca3af;text-align:center">GRD</div>`;
    scroll.appendChild(hrow);
    subs.forEach(sub=>{
      const score=marks[sub]||0,failed=!isPass(score);
      const col=failed?"#dc2626":score>=80?"#16a34a":"#2563eb";
      const sg=grades[sub]||scoreToGrade(score),gc=GRADE_COLORS[sg]||"#6b7280";
      const row=div("mark-row");row.style.background=failed?"#fef2f2":"#fff";row.style.border=failed?"1px solid #fca5a5":"1px solid transparent";
      const subEl=div("mark-sub");subEl.textContent=sub;subEl.style.color=failed?"#dc2626":"#374151";
      const bw=div("mark-bar-wrap"),bf=div("mark-bar-fill");bf.style.width=score+"%";bf.style.background=col;bw.appendChild(bf);
      const sc=div("");sc.style.cssText=`width:46px;font-size:11px;font-weight:700;text-align:right;color:${col};`;sc.textContent=score+"/100";
      const gw=div("");css(gw,{width:"36px",display:"flex",justifyContent:"center"});
      const gb=div("");gb.style.cssText=`background:${gc};color:#fff;font-weight:800;font-size:10px;border-radius:6px;padding:3px 6px;min-width:28px;text-align:center;`;gb.textContent=sg;
      gw.appendChild(gb);row.appendChild(subEl);row.appendChild(bw);row.appendChild(sc);row.appendChild(gw);
      if(failed){const f=div("");f.style.cssText="font-size:9px;color:#dc2626;font-weight:800;margin-left:2px;";f.textContent="FAIL";row.appendChild(f);}

function buildUploadView(scroll){
  scroll.appendChild(secTitle("📤 Upload & Send Marks"));


  // Refresh button
  const refreshRow=div("");css(refreshRow,{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"});
  const countLbl=div("");countLbl.style.cssText="font-size:12px;color:#6b7280;font-weight:600;";
  countLbl.textContent=`👨‍🎓 ${allStudents().length} student(s) loaded`;
  const refreshBtn=btn("","🔄 Refresh",async()=>{
    refreshBtn.textContent="⏳ Loading…";refreshBtn.disabled=true;
    await loadAllData();
    refreshBtn.textContent="🔄 Refresh";refreshBtn.disabled=false;
    showToast("✅ Data refreshed!");
  });
  css(refreshBtn,{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:"10px",padding:"6px 14px",fontSize:"12px",fontWeight:"700",color:"#15803d"});
  refreshRow.appendChild(countLbl);refreshRow.appendChild(refreshBtn);scroll.appendChild(refreshRow);

  const si=document.createElement("input");si.className="fi";si.placeholder="🔍 Search student…";si.value=APP.staffSearch;
  css(si,{width:"100%",marginBottom:"10px",padding:"9px 12px",border:"1.5px solid #e5e7eb",borderRadius:"12px"});
  si.oninput=e=>{APP.staffSearch=e.target.value;render();};scroll.appendChild(si);

  const students=allStudents().filter(s=>s.name.toLowerCase().includes(APP.staffSearch.toLowerCase())||s.roll.toLowerCase().includes(APP.staffSearch.toLowerCase()));
  if(!students.length){
    const emptyBox=div("");css(emptyBox,{textAlign:"center",padding:"30px 20px"});
    emptyBox.innerHTML=`<div style="font-size:40px;margin-bottom:10px">👨‍🎓</div><div style="font-weight:700;font-size:14px;color:#374151;margin-bottom:6px">No students found</div><div style="font-size:12px;color:#6b7280;margin-bottom:16px">Add students from the ➕ Add tab, then tap Refresh</div>`;
    const addBtn2=btn("action-btn","➕ Go to Add Student",()=>{APP.staffView="add";APP.addForm=emptyStudentForm();APP.addErrors={};render();});
    emptyBox.appendChild(addBtn2);scroll.appendChild(emptyBox);return;
  }

  students.forEach(student=>{
    const cm=resolveMarks(student.id),cg=APP.grades[student.id]||{};
    const c=div("staff-card");
    const top=div("");css(top,{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"});
    top.innerHTML=`<span style="font-size:28px">${student.photo}</span><div><div style="font-weight:700;font-size:14px">${student.name}</div><div style="font-size:11px;color:#6b7280">${student.roll} • ${student.semester}</div></div>`;
    c.appendChild(top);

    APP.subjects.forEach(sub=>{
      const score=cm[sub]!==undefined?cm[sub]:"";
      const ag=scoreToGrade(typeof score==="number"?score:0);
      const sg=(cg[sub])||ag;
      const row=div("sub-row");
      const lbl=div("sub-row-label");lbl.textContent=sub;
      const si2=document.createElement("input");si2.className="sub-row-input";si2.type="number";si2.min="0";si2.max="100";si2.placeholder="0-100";si2.value=score;
      si2.onchange=async e=>{
        const val=Math.min(100,Math.max(0,parseInt(e.target.value)||0));
        e.target.value=val;
        const ag2=scoreToGrade(val);
        await dbUpdate(`marks/${student.id}`,{[sub]:val});
        if(!(APP.grades[student.id]&&APP.grades[student.id][sub+"_manual"])){
          await dbUpdate(`grades/${student.id}`,{[sub]:ag2});
        }
      };
      const sel=document.createElement("select");sel.className="grade-select";sel.style.background=GRADE_COLORS[sg]||"#6b7280";
      GRADE_OPTIONS.forEach(g=>{const o=document.createElement("option");o.value=g;o.textContent=g;if(g===sg)o.selected=true;sel.appendChild(o);});
      sel.onchange=async e=>{
        await dbUpdate(`grades/${student.id}`,{[sub]:e.target.value,[sub+"_manual"]:true});
        e.target.style.background=GRADE_COLORS[e.target.value]||"#6b7280";
      };
      row.appendChild(lbl);row.appendChild(si2);row.appendChild(sel);c.appendChild(row);
    });

    // Save all marks button
    const saveBtn=btn("","💾 Save All Marks",async()=>{
      const inputs=c.querySelectorAll(".sub-row-input");
      const marksData={};const gradesData={};
      APP.subjects.forEach((sub,i)=>{
        const val=Math.min(100,Math.max(0,parseInt(inputs[i]?.value)||0));
        marksData[sub]=val;
        if(!(APP.grades[student.id]&&APP.grades[student.id][sub+"_manual"])){gradesData[sub]=scoreToGrade(val);}
      });
      await dbSet(`marks/${student.id}`,marksData);
      if(Object.keys(gradesData).length)await dbUpdate(`grades/${student.id}`,gradesData);
      showToast("✅ "+student.name+"'s marks saved to Firebase!");
    });
    css(saveBtn,{width:"100%",background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:"10px",padding:"8px",fontSize:"12px",fontWeight:"700",color:"#15803d",marginBottom:"6px"});

  
    c.appendChild(saveBtn);scroll.appendChild(c);
  });
}

  css(msgArea,{width:"100%",border:"1.5px solid #e5e7eb",borderRadius:"10px",padding:"10px 12px",fontSize:"13px",minHeight:"90px",resize:"none",outline:"none",boxSizing:"border-box",fontFamily:"inherit",marginBottom:"10px"});
  broadBox.appendChild(msgArea);

  // Send button — in-app notification only
  const sendBtn=btn("","🔔 Send Notification to All Students",async()=>{
    const subj=subjInp.value.trim(),msg=msgArea.value.trim();
    if(!msg){showToast("⚠️ Please type a message!");return;}
    if(!allStudents().length){showToast("⚠️ No students found! Refresh first.");return;}
    sendBtn.textContent="⏳ Sending…";sendBtn.disabled=true;
    const students=allStudents();
    // Save to Firebase (in-app notification)
    for(const s of students){
      await dbPush("notifications",{
        studentId:s.id,student:s.name,type:"app",
        time:Date.now(),isBroadcast:true,
        subject:subj||"Announcement",message:msg,
        msgType:broadType,from:APP.authUser.name
      });
    }
    // Also send real push notification to all student devices
    const pushTitle = subj||"📢 "+CI.short+" Announcement";
    const pushBody = msg.length>100 ? msg.substring(0,100)+"…" : msg;
    sendBtn.textContent="🔔 Send Notification to All Students";sendBtn.disabled=false;
    subjInp.value="";msgArea.value="";
    showToast(`✅ Notification sent to all ${students.length} students!`);
    render();
  });
  css(sendBtn,{width:"100%",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:"12px",padding:"13px",fontSize:"13px",fontWeight:"800"});
  broadBox.appendChild(sendBtn);
  scroll.appendChild(broadBox);

  // ── NOTIFICATIONS LOG ──
  scroll.appendChild(secTitle("📋 Sent Notifications ("+APP.notifications.length+")"));
  if(!APP.notifications.length){scroll.appendChild(emptyMsg("No notifications sent yet."));return;}

  APP.notifications.forEach(n=>{
    const isBroad=n.isBroadcast;
    const card=div("notif-card");
    card.style.background=isBroad?"#f0fdf4":"#f9fafb";
    card.style.border=isBroad?"1px solid #bbf7d0":"1px solid #e5e7eb";
    card.style.borderRadius="12px";

    const ic=span("");ic.style.fontSize="22px";
    ic.textContent=isBroad?(n.msgType==="exam"?"📝":n.msgType==="holiday"?"🎉":n.msgType==="fees"?"💳":n.msgType==="event"?"🎊":"📢"):"📊";

    const info=div("");info.style.flex="1";

    if(isBroad){
      const badge=span("");badge.style.cssText="background:#16a34a;color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:10px;margin-left:6px;";badge.textContent="ALL STUDENTS";
      const topRow=div("");css(topRow,{display:"flex",alignItems:"center",gap:"4px",marginBottom:"3px"});
      const nameEl=div("");nameEl.style.cssText="font-weight:700;font-size:13px;";nameEl.textContent=n.subject||"Announcement";
      topRow.appendChild(nameEl);topRow.appendChild(badge);
      const meta=div("");meta.style.cssText="font-size:10px;color:#6b7280;margin-bottom:4px;";
      meta.textContent=`By ${n.from||"Staff"} • ${new Date(n.time).toLocaleString()}`;
      const msgEl=div("");msgEl.style.cssText="font-size:11px;color:#374151;background:#fff;border-radius:8px;padding:6px 8px;margin-top:4px;line-height:1.5;";
      msgEl.textContent=n.message||"";
      info.appendChild(topRow);info.appendChild(meta);info.appendChild(msgEl);
    } else {
      info.innerHTML=`<div style="font-weight:700;font-size:13px">${n.student}</div><div style="font-size:11px;color:#6b7280">${new Date(n.time).toLocaleString()}</div>`;
      const chips=div("");css(chips,{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"4px"});
      Object.entries(n.marksWithGrades||n.marks||{}).forEach(([sub,val])=>{
        const score=typeof val==="object"?val.score:val,grade=typeof val==="object"?val.grade:scoreToGrade(score),gc=GRADE_COLORS[grade]||"#6b7280";
        const chip=span("");chip.style.cssText=`background:#f9fafb;border:1px solid ${gc}20;color:#374151;font-size:10px;padding:2px 5px;border-radius:6px;font-weight:600;display:inline-flex;align-items:center;gap:3px;`;
        chip.innerHTML=`${sub}: ${score} <span style="background:${gc};color:#fff;border-radius:4px;padding:0 4px;font-weight:800">${grade}</span>`;
        chips.appendChild(chip);
      });
      info.appendChild(chips);
    }
    card.appendChild(ic);card.appendChild(info);scroll.appendChild(card);
  });
}

// ── PWA ────────────────────────────────────────────────────────
// Write manifest as inline JSON in a script tag so Chrome can find it
// Manifest is loaded from manifest.json file (hosted on Netlify)

// Service Worker — only register on Netlify (not in preview)
if("serviceWorker" in navigator && location.hostname !== "www.claudeusercontent.com"){
  navigator.serviceWorker.register("sw.js").then(()=>{
    console.log("SW registered ✅");
  }).catch(e=>console.log("SW failed:",e));
}

// Install prompt — Android Chrome
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredPrompt=e;
  showInstallBanner();
});

// Also show install button on app loaded
window.addEventListener("appinstalled",()=>{
  showToast("🎉 ACT Portal installed successfully!");
  const bar=document.getElementById("install-bar");
  if(bar)bar.remove();
});

function showInstallBanner(){
  if(document.getElementById("install-bar"))return;
  const b=document.createElement("div");
  b.id="install-bar";
  b.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#15803d;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:inherit;box-shadow:0 -4px 24px rgba(0,0,0,0.3);";
  b.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:28px">📲</div>
      <div>
        <div style="font-weight:800;font-size:14px">Install ACT Portal</div>
        <div style="font-size:11px;opacity:0.85">Add to Home Screen for quick access</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="document.getElementById('install-bar').remove()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer">Later</button>
      <button id="do-install" style="background:#fff;color:#16a34a;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer">Install ✓</button>
    </div>`;
  document.body.appendChild(b);
  document.getElementById("do-install").onclick=async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    deferredPrompt=null;
    document.getElementById("install-bar").remove();
    if(outcome==="accepted")showToast("🎉 ACT Portal installed!");
  };
}

// iOS Safari — show manual instructions
function isIOS(){return/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;}
function isInStandalone(){return window.navigator.standalone||window.matchMedia("(display-mode:standalone)").matches;}

if(isIOS()&&!isInStandalone()){
  setTimeout(()=>{
    if(document.getElementById("ios-install"))return;
    const b=document.createElement("div");
    b.id="ios-install";
    b.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#15803d;color:#fff;padding:16px 16px 24px;z-index:9999;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.3);font-family:inherit;";
    b.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:26px">📲</div>
          <div style="font-weight:800;font-size:15px">Install ACT Portal</div>
        </div>
        <button onclick="document.getElementById('ios-install').remove()" style="background:rgba(255,255,255,0.25);border:none;color:#fff;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer">×</button>
      </div>
      <div style="font-size:13px;line-height:1.9;opacity:0.95">
        <div>1️⃣ Tap the <strong>Share</strong> button <strong>⎙</strong> at the bottom</div>
        <div>2️⃣ Tap <strong>"Add to Home Screen"</strong></div>
        <div>3️⃣ Tap <strong>Add</strong> — icon appears on home screen!</div>
      </div>`;
    document.body.appendChild(b);
  },2000);
}

APP.fbConfig={databaseURL:FB_URL};
render();
